<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema OTIF — Química Anastácio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--bg:#F4F6FA;--wh:#FFF;--sf:#F8F9FC;--bd:rgba(0,0,0,.07);--tx:#1A1D2B;--t2:#4A5068;--mt:#8690A8;--nv:#0D2240;--n2:#162D50;--ac:#2563EB;--ab:rgba(37,99,235,.08);--gn:#16A34A;--gb:#DCFCE7;--gr:rgba(22,163,74,.2);--rd:#DC2626;--rb:#FEE2E2;--rr:rgba(220,38,38,.18);--yl:#D97706;--yb:#FEF3C7;--ra:16px;--sh:0 1px 3px rgba(0,0,0,.04)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);height:100vh;overflow:hidden;display:flex}

/* ── LOGIN ── */
#loginScreen{position:fixed;inset:0;background:linear-gradient(135deg,#0D2240 0%,#1e3a5f 100%);display:flex;align-items:center;justify-content:center;z-index:99999}
.login-box{background:#fff;border-radius:20px;padding:40px 36px;width:360px;box-shadow:0 24px 80px rgba(0,0,0,.3)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo h1{font-family:'Plus Jakarta Sans',sans-serif;font-size:22px;font-weight:800;color:var(--nv)}
.login-logo h1 span{color:#2563EB}
.login-logo small{font-size:10px;color:var(--mt);letter-spacing:2px;text-transform:uppercase;display:block;margin-top:2px}
.lf{margin-bottom:14px}
.lf label{font-size:11px;font-weight:700;color:var(--t2);display:block;margin-bottom:5px}
.lf input{width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid #E5E7EB;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border .15s}
.lf input:focus{border-color:var(--ac)}
#loginErr{font-size:11px;color:var(--rd);text-align:center;margin-bottom:10px;min-height:16px;font-weight:600}
.login-btn{width:100%;padding:12px;border-radius:10px;border:none;background:var(--nv);color:#fff;font-size:13px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;transition:background .15s}
.login-btn:hover{background:var(--n2)}

/* ── APP ── */
#appShell{display:none;width:100%;height:100%;flex-direction:row}
#appShell.visible{display:flex}

/* Sidebar */
.sb{width:200px;background:var(--nv);display:flex;flex-direction:column;padding:16px 0;flex-shrink:0}
.sb-lg{padding:0 14px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-lg h2{font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:800;color:#fff}
.sb-lg h2 span{color:#60A5FA}
.sb-lg small{font-size:8px;color:rgba(255,255,255,.3);letter-spacing:2px;text-transform:uppercase}
.sb-logo-img{width:100%;max-height:38px;object-fit:contain;margin-bottom:6px;border-radius:6px;cursor:pointer}
.zeus-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(96,165,250,.2);color:#60A5FA;border-radius:100px;padding:2px 8px;font-size:9px;font-weight:700;letter-spacing:.5px;margin-top:4px}
.sb nav{flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:1px;overflow-y:auto}
.nb{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;border:none;cursor:pointer;font-size:11px;font-weight:600;font-family:'DM Sans',sans-serif;background:transparent;color:rgba(255,255,255,.4);transition:all .15s;text-align:left;width:100%}
.nb:hover{color:rgba(255,255,255,.7);background:rgba(255,255,255,.04)}
.nb.on{background:rgba(96,165,250,.15);color:#60A5FA}
.sb-bt{padding:10px 12px 6px;border-top:1px solid rgba(255,255,255,.08)}
.sb-bt label{font-size:8px;color:rgba(255,255,255,.3);letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:4px}
.sb-bt select{width:100%;padding:6px 8px;border-radius:6px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#fff;font-size:11px;font-family:'DM Sans',sans-serif;outline:none}
.sb-bt select option{background:var(--nv);color:#fff}

/* Main */
.mw{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 24px;background:#fff;border-bottom:1px solid var(--bd);flex-shrink:0;gap:8px;flex-wrap:wrap}
.tf{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.fsel{padding:5px 26px 5px 8px;border-radius:6px;border:1px solid #E5E7EB;font-size:11px;font-weight:600;font-family:'DM Sans',sans-serif;color:var(--tx);background:#fff url("data:image/svg+xml,%3Csvg width='8' height='5' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%234A5068' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E") no-repeat right 6px center;appearance:none;outline:none;cursor:pointer}
#mainContent{flex:1;overflow:auto;padding:20px 24px 36px}

/* Cards */
.cd{background:#fff;border:1px solid var(--bd);border-radius:var(--ra);box-shadow:var(--sh)}.cp{padding:20px}

/* KPIs */
.kg{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.kp{position:relative;overflow:hidden;padding:16px 18px}.kp::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%}
.kp.g::before{background:var(--gn)}.kp.b::before{background:var(--ac)}.kp.r::before{background:var(--rd)}
.kl{font-size:9px;color:var(--mt);text-transform:uppercase;letter-spacing:.8px;font-weight:700;margin-bottom:8px}
.kv{font-family:'Plus Jakarta Sans',sans-serif;font-size:26px;font-weight:800;line-height:1}
.ks{font-size:10px;color:var(--mt);margin-top:4px}

/* Charts */
.cg{display:grid;grid-template-columns:5fr 3fr;gap:10px;margin-bottom:16px}
.bw{display:flex;align-items:flex-end;gap:6px;height:130px;border-bottom:2px solid #EEF1F6}
.bc{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end}
.bv{font-size:9px;font-weight:700;font-family:'Plus Jakarta Sans',sans-serif}
.br{width:100%;max-width:32px;border-radius:5px 5px 0 0;min-height:2px}
.br.f{background:linear-gradient(180deg,#22c55e,#16a34a)}.br.p{background:linear-gradient(180deg,#fbbf24,#d97706)}
.bm{font-size:8px;color:var(--mt);font-weight:600;text-transform:uppercase;padding-top:6px}
.dw{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px}
.dr{position:relative;width:110px;height:110px}.dr svg{transform:rotate(-90deg)}
.dc{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.dc .dv{font-family:'Plus Jakarta Sans',sans-serif;font-size:24px;font-weight:800;color:var(--gn);line-height:1}
.dc .dl{font-size:8px;color:var(--mt);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.lg{display:flex;gap:12px}.lg span{font-size:10px;color:var(--t2);display:flex;align-items:center;gap:4px}
.lg i{width:8px;height:8px;border-radius:2px;display:inline-block}

/* Tables */
.th{padding:12px 16px;border-bottom:1px solid var(--bd);background:var(--sf);font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
table{width:100%;border-collapse:collapse}
th{padding:8px 10px;font-size:8.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--mt);font-weight:700;text-align:left;border-bottom:1px solid var(--bd);white-space:nowrap}
td{padding:8px 10px;font-size:11px;vertical-align:middle;border-bottom:1px solid rgba(0,0,0,.03)}
tr.is{background:rgba(220,38,38,.02)}

/* Status */
.st{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;transition:all .12s;border:1px solid transparent}
.st.ok{background:var(--gb);color:var(--gn);border-color:var(--gr)}.st.fl{background:var(--rb);color:var(--rd);border-color:var(--rr)}
.st:hover{transform:scale(1.15)}

/* OTIF input */
.oe{width:50px;padding:3px 4px;border-radius:5px;border:1px solid #D1D5DB;font-size:12px;font-weight:800;font-family:'Plus Jakarta Sans',sans-serif;text-align:center;outline:none}
.oe.ok{color:var(--gn)}.oe.lo{color:var(--yl)}

/* Buttons */
.bt{display:inline-flex;align-items:center;gap:5px;padding:7px 16px;border-radius:8px;border:none;font-size:11px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .12s}
.bp{background:var(--nv);color:#fff}.bp:hover{background:var(--n2)}
.bo{background:#fff;color:var(--t2);border:1px solid #E5E7EB}
.bgr{background:var(--gn);color:#fff}

/* Inputs */
.in{padding:7px 12px;border-radius:8px;border:1px solid #E5E7EB;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;width:100%}.in:focus{border-color:var(--ac)}

/* Clients */
.cc{display:flex;align-items:center;gap:12px;padding:14px 18px;margin-bottom:8px}.cc.off{opacity:.4}
.la{width:50px;height:50px;border-radius:10px;border:2px dashed #D1D5DB;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;flex-shrink:0;background:var(--sf)}
.la img{width:100%;height:100%;object-fit:contain}.la:hover{border-color:var(--ac)}
.ib{width:30px;height:30px;border-radius:7px;border:1px solid #E5E7EB;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer}.ib:hover{border-color:var(--ac);background:var(--ab)}.ib.dg{border-color:#FCA5A5}.ib.dg:hover{background:var(--rb)}

/* Page header */
.ph h1{font-family:'Plus Jakarta Sans',sans-serif;font-size:20px;font-weight:800;color:var(--nv)}
.ph p{font-size:11px;color:var(--mt);margin-top:2px}.ph{margin-bottom:18px;display:flex;justify-content:space-between;align-items:flex-start}

/* Form table */
.ft{width:100%;border-collapse:collapse}.ft th,.ft td{padding:8px 12px;border:1px solid var(--bd);text-align:center;font-size:11px}
.ft th{background:var(--sf);font-weight:700;color:var(--nv);font-size:9px;text-transform:uppercase;letter-spacing:.4px}
.ft td.inn{text-align:left;font-weight:600;color:var(--tx);font-size:10px;background:#FAFBFD;min-width:200px;white-space:normal;line-height:1.3}

/* Consolidado */
.cv{font-weight:800;font-size:14px;text-align:center;padding:6px}
.cv.gn{background:var(--gb);color:var(--gn)}.cv.rd{background:var(--rb);color:var(--rd)}.cv.yl{background:var(--yb);color:var(--yl)}

/* Actions table */
.at{width:100%;border-collapse:collapse;font-size:11px}
.at th{padding:8px;font-size:8px;text-transform:uppercase;letter-spacing:.5px;color:var(--mt);font-weight:700;text-align:left;border-bottom:2px solid var(--bd);background:var(--sf);white-space:nowrap}
.at td{padding:6px 8px;border-bottom:1px solid var(--bd);vertical-align:top}

/* Misc */
.cl{height:56px;object-fit:contain}
.ep{border:2px solid #E5E7EB;border-radius:var(--ra);padding:24px 20px;background:#fff}
.eh{text-align:center;padding-bottom:14px;border-bottom:1px solid #EEF1F6;margin-bottom:14px}
.to{position:fixed;top:16px;right:16px;z-index:9999;padding:10px 18px;border-radius:10px;background:var(--nv);color:#fff;font-size:12px;font-weight:600;box-shadow:0 8px 32px rgba(0,0,0,.15);transform:translateX(120%);transition:transform .3s ease}.to.sh{transform:translateX(0)}
.mc{padding:4px 9px;border-radius:100px;border:1px solid #E5E7EB;font-size:9px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;background:#fff;color:var(--t2);display:inline-block;user-select:none}
.mc.on{background:var(--nv);color:#fff;border-color:var(--nv)}.mc:hover:not(.on){border-color:var(--ac)}
.dz{border:2px dashed #D1D5DB;border-radius:var(--ra);padding:30px;text-align:center;cursor:pointer;background:#FAFBFD}.dz:hover{border-color:var(--ac);background:var(--ab)}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:100px}

/* Zeus */
.user-card{display:flex;align-items:center;gap:14px;padding:14px 18px;background:#fff;border:1px solid var(--bd);border-radius:12px;margin-bottom:8px}
.uc-info{flex:1}
.uc-name{font-size:13px;font-weight:700;color:var(--nv)}
.uc-email{font-size:11px;color:var(--mt);margin-top:2px}
.badge{padding:2px 10px;border-radius:100px;font-size:9px;font-weight:700}
.badge-admin{background:#EDE9FE;color:#7C3AED}
.badge-editor{background:var(--yb);color:var(--yl)}
.badge-viewer{background:var(--ab);color:var(--ac)}
.theme-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bd)}
.theme-row:last-child{border-bottom:none}
.theme-label{font-size:12px;font-weight:600;color:var(--t2)}
.theme-sub{font-size:10px;color:var(--mt);margin-top:1px}
.color-swatch{width:36px;height:36px;border-radius:8px;border:2px solid #E5E7EB;overflow:hidden;cursor:pointer;padding:0}
.color-swatch input[type=color]{width:150%;height:150%;margin:-20%;border:none;cursor:pointer;background:none;padding:0}
</style>
</head>
<body>

<!-- ── TELA DE LOGIN ── -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <div id="loginLogoImg" style="display:none;margin-bottom:10px"></div>
      <h1>Química <span>Anastácio</span></h1>
      <small>Painel OTIF · Acesso Restrito</small>
    </div>
    <div class="lf">
      <label>E-mail</label>
      <input type="email" id="loginEmail" placeholder="seu@email.com" onkeydown="if(event.key==='Enter')document.getElementById('loginPass').focus()">
    </div>
    <div class="lf">
      <label>Senha</label>
      <input type="password" id="loginPass" placeholder="Sua senha" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div id="loginErr"></div>
    <button class="login-btn" onclick="doLogin()">Entrar</button>
  </div>
</div>

<!-- ── APP PRINCIPAL ── -->
<div id="appShell">

<aside class="sb">
  <div class="sb-lg">
    <div id="sbLogoWrap" style="display:none"><img id="sbLogoImg" class="sb-logo-img" title="Logo"></div>
    <h2>Química <span>Anastácio</span></h2>
    <small>Painel OTIF</small>
    <div id="zeusBadgeWrap" style="display:none"><span class="zeus-badge">Zeus</span></div>
  </div>
  <nav id="navArea"></nav>
  <div class="sb-bt">
    <label>Cliente</label>
    <select id="clientSel" onchange="window._selC=this.value;renderAll()"></select>
  </div>
</aside>

<div class="mw">
  <div class="topbar">
    <div class="tf">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#8690A8" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
      <select id="yearSel" class="fsel" onchange="renderAll()"></select>
      <span style="font-size:10px;color:var(--mt);font-weight:600">Meses:</span>
      <div id="mChips" style="display:flex;gap:3px;flex-wrap:wrap"></div>
    </div>
    <div style="font-size:11px;color:var(--mt)" id="dateNow"></div>
  </div>
  <div id="mainContent"></div>
</div>

</div><!-- /appShell -->

<div id="mdl" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:9000;align-items:center;justify-content:center" onclick="if(event.target===this)this.style.display='none'">
  <div style="background:#fff;border-radius:14px;padding:24px;width:560px;max-width:92vw;max-height:85vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <h2 id="mdlT" style="font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;font-weight:800;color:#0D2240;margin:0"></h2>
      <button onclick="document.getElementById('mdl').style.display='none'" style="background:none;border:none;cursor:pointer;color:#8690A8;font-size:18px">x</button>
    </div>
    <div id="mdlB"></div>
  </div>
</div>
<div class="to" id="toastEl"></div>

<script>
// ═══════════════════════════════════════
// SUPABASE CONFIG
// ═══════════════════════════════════════
var SUPABASE_URL = "https://gccapgdlgouixlznrkrb.supabase.co";
var SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdjY2FwZ2RsZ291aXhsem5ya3JiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NjI0NzksImV4cCI6MjA5MDAzODQ3OX0.DSqv9LPZxsBq_aantFaF75TiONntqiJWydtiJ6Lrkck";

function sbHeaders(extra) {
  var h = {
    "apikey": SUPABASE_KEY,
    "Authorization": "Bearer " + SUPABASE_KEY,
    "Content-Type": "application/json",
    "Prefer": "return=representation"
  };
  if (extra) { Object.keys(extra).forEach(function(k){ h[k] = extra[k]; }); }
  return h;
}
function sbGet(path) {
  return fetch(SUPABASE_URL + "/rest/v1/" + path, { headers: sbHeaders() }).then(function(r){ return r.json(); });
}
function sbUpsert(table, data) {
  var body = Array.isArray(data) ? data : [data];
  return fetch(SUPABASE_URL + "/rest/v1/" + table, {
    method: "POST",
    headers: sbHeaders({ "Prefer": "resolution=merge-duplicates,return=representation" }),
    body: JSON.stringify(body)
  }).then(function(r){ return r.json(); });
}
function sbDelete(table, filter) {
  return fetch(SUPABASE_URL + "/rest/v1/" + table + "?" + filter, {
    method: "DELETE",
    headers: sbHeaders()
  });
}

// ═══════════════════════════════════════
// AUTH — ZEUS & USUÁRIOS
// ═══════════════════════════════════════
var ZEUS_EMAIL = "amanda.almeida@anastacio.com";
var ZEUS_PASS  = "Anastacio@2026";
var _isZeus    = false;
var _userRole  = null;
var USERS      = [];

function doLogin() {
  var email = document.getElementById("loginEmail").value.trim().toLowerCase();
  var pass  = document.getElementById("loginPass").value;
  var err   = document.getElementById("loginErr");
  err.textContent = "";

  if (!email || !pass) { err.textContent = "Preencha e-mail e senha."; return; }

  // Zeus
  if (email === ZEUS_EMAIL.toLowerCase() && pass === ZEUS_PASS) {
    _isZeus   = true;
    _userRole = "zeus";
    enterApp();
    return;
  }

  // Usuários cadastrados
  loadUsers().then(function() {
    var found = null;
    for (var i = 0; i < USERS.length; i++) {
      if (USERS[i].email.toLowerCase() === email) { found = USERS[i]; break; }
    }
    if (!found) { err.textContent = "E-mail nao encontrado."; return; }
    if (found.status === "inactive") { err.textContent = "Acesso desativado. Fale com o administrador."; return; }
    if (found.pass !== pass) { err.textContent = "Senha incorreta."; return; }
    _isZeus   = false;
    _userRole = found.role;
    enterApp();
  });
}

function enterApp() {
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("appShell").classList.add("visible");
  if (_isZeus) {
    document.getElementById("zeusBadgeWrap").style.display = "block";
  }
  var logo = localStorage.getItem("otif_logo");
  if (logo) {
    document.getElementById("sbLogoImg").src = logo;
    document.getElementById("sbLogoWrap").style.display = "block";
    var li = document.getElementById("loginLogoImg");
    li.innerHTML = '<img src="' + logo + '" style="max-height:48px;object-fit:contain">';
    li.style.display = "block";
  }
  applyStoredTheme();
  initApp();
}

// Carregar usuários do Supabase (com fallback em localStorage)
function loadUsers() {
  return fetch(SUPABASE_URL + "/rest/v1/usuarios?order=created_at.asc", {
    headers: sbHeaders()
  }).then(function(r) {
    if (r.ok) return r.json();
    throw new Error("Falha");
  }).then(function(data) {
    USERS = data || [];
  }).catch(function() {
    var saved = localStorage.getItem("otif_users");
    USERS = saved ? JSON.parse(saved) : [];
  });
}

// Salvar usuário no Supabase
function saveUser(u) {
  var body = JSON.stringify([{ id: u.id, name: u.name, email: u.email, pass: u.pass, role: u.role, status: u.status }]);
  fetch(SUPABASE_URL + "/rest/v1/usuarios", {
    method: "POST",
    headers: sbHeaders({ "Prefer": "resolution=merge-duplicates" }),
    body: body
  }).catch(function(){});
  localStorage.setItem("otif_users", JSON.stringify(USERS));
}

function deleteUserRemote(id) {
  fetch(SUPABASE_URL + "/rest/v1/usuarios?id=eq." + id, {
    method: "DELETE",
    headers: sbHeaders()
  }).catch(function(){});
  localStorage.setItem("otif_users", JSON.stringify(USERS));

var _saving = false;
var _saveTimer = null;

async function loadData() {
  try {
    var results = await Promise.all([
      sbGet("clientes?order=created_at.asc"),
      sbGet("indicadores?order=ordem.asc"),
      sbGet("registros?select=*"),
      sbGet("acoes?order=created_at.asc"),
      sbGet("fncs?select=*")
    ]);
    var clientes = results[0], indicadores = results[1], registrosRaw = results[2], acoesRaw = results[3], fncsRaw = results[4];

    if (clientes && clientes.length) CLS = clientes;
    if (indicadores && indicadores.length) IND = indicadores;
    if (registrosRaw && registrosRaw.length) {
      RCS = registrosRaw.map(function(r) {
        var obj = { cid: r.cid, y: r.y, m: r.m, otif: r.otif };
        if (r.dados) Object.keys(r.dados).forEach(function(k){ obj[k] = r.dados[k]; });
        return obj;
      });
    }
    if (acoesRaw && acoesRaw.length) {
      ACOES = acoesRaw.map(function(a) {
        return { id: a.id, mes: a.mes||"", cliente: a.cliente||"", desvio: a.desvio||"", material: a.material||"", embalagem: a.embalagem||"", volume: a.volume||"", dataDesvio: a.data_desvio||"", responsavel: a.responsavel||"", fnc: a.fnc||"", planoAcao: a.plano_acao||"" };
      });
    }
    if (fncsRaw && fncsRaw.length) {
      FNCS = fncsRaw.map(function(f) {
        var obj = { id: f.id };
        if (f.dados) Object.keys(f.dados).forEach(function(k){ obj[k] = f.dados[k]; });
        return obj;
      });
    }
  } catch(e) {
    console.warn("Erro ao carregar do Supabase:", e);
  }
  if (!RCS.length) RCS = defaultRecs();
}

async function saveData() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(async function() {
    if (_saving) return;
    _saving = true;
    try {
      if (CLS.length) await sbUpsert("clientes", CLS.map(function(c){ return { id: c.id, name: c.name, logo: c.logo||null, active: c.active!==false }; }));
      if (IND.length) await sbUpsert("indicadores", IND.map(function(ind, i){ return { key: ind.key, label: ind.label, ordem: i }; }));
      if (RCS.length) {
        var regs = RCS.map(function(r) {
          var dados = {};
          Object.keys(r).forEach(function(k){ if (k !== "cid" && k !== "y" && k !== "m" && k !== "otif") dados[k] = r[k]; });
          return { cid: r.cid, y: r.y, m: r.m, otif: r.otif, dados: dados };
        });
        await sbUpsert("registros", regs);
      }
      await sbDelete("acoes", "id=gt.0");
      if (ACOES.length) {
        await sbUpsert("acoes", ACOES.map(function(a){ return { id: a.id, mes: a.mes||"", cliente: a.cliente||"", desvio: a.desvio||"", material: a.material||"", embalagem: a.embalagem||"", volume: a.volume||"", data_desvio: a.dataDesvio||"", responsavel: a.responsavel||"", fnc: a.fnc||"", plano_acao: a.planoAcao||"" }; }));
      }
      await sbDelete("fncs", "id=gt.0");
      if (FNCS.length) {
        await sbUpsert("fncs", FNCS.map(function(f){ var id = f.id; var dados = {}; Object.keys(f).forEach(function(k){ if (k !== "id") dados[k] = f[k]; }); return { id: id, dados: dados }; }));
      }
    } catch(e) {
      toast("Erro ao salvar");
    }
    _saving = false;
  }, 1500);
}

async function saveNewUser() {
  var name  = document.getElementById("nuName").value.trim();
  var email = document.getElementById("nuEmail").value.trim().toLowerCase();
  var pass  = document.getElementById("nuPass").value;
  var role  = document.getElementById("nuRole").value;
  var err   = document.getElementById("nuErr");
  if (!name||!email||!pass) { err.textContent = "Preencha todos os campos."; return; }
  if (pass.length < 6) { err.textContent = "Senha minimo 6 caracteres."; return; }
  var existing = USERS.find(function(u){ return u.email.toLowerCase()===email; });
  if (existing) { err.textContent = "Este e-mail ja esta cadastrado."; return; }
  var newUser = { id: "u_"+Date.now(), name: name, email: email, pass: pass, role: role, status: "active" };
  USERS.push(newUser);
  saveUser(newUser);
  document.getElementById("mdl").style.display = "none";
  renderAll();
  toast("Usuario " + name + " criado!");
}

function openEditUserModal(id) {
  var u = USERS.find(function(x){ return x.id===id; });

function saveEditUser(id) {
  var u = USERS.find(function(x){ return x.id===id; });
  if (!u) return;
  var name  = document.getElementById("euName").value.trim();
  var email = document.getElementById("euEmail").value.trim().toLowerCase();
  var pass  = document.getElementById("euPass").value;
  var role  = document.getElementById("euRole").value;
  var err   = document.getElementById("euErr");
  if (!name||!email) { err.textContent = "Nome e e-mail sao obrigatorios."; return; }
  if (pass && pass.length < 6) { err.textContent = "Senha minimo 6 caracteres."; return; }
  u.name = name; u.email = email; u.role = role;
  if (pass) u.pass = pass;
  saveUser(u);
  document.getElementById("mdl").style.display = "none";
  renderAll();
  toast("Usuario " + name + " atualizado!");
}

function deleteUserById(id) {
  var u = USERS.find(function(x){ return x.id===id; });
  if (!u || !confirm("Excluir o usuario " + u.name + "?")) return;
  USERS = USERS.filter(function(x){ return x.id!==id; });
  deleteUserRemote(id);
  renderAll();
  toast("Usuario excluido.");
}

function toggleUserStatus(id) {
  var u = USERS.find(function(x){ return x.id===id; });
  if (!u) return;
  u.status = u.status === "active" ? "inactive" : "active";
  saveUser(u);
  renderAll();
  toast(u.name + (u.status==="active"?" ativado":" desativado") + ".");
}

function loadTheme(){ return JSON.parse(localStorage.getItem("otif_theme")||"{}"); }
function applyColor(v,val){ document.documentElement.style.setProperty(v,val); }
function saveThemeColor(k,val){ var th=loadTheme(); th[k]=val; localStorage.setItem("otif_theme",JSON.stringify(th)); }
function applyFont(font){
  document.body.style.fontFamily = "'" + font + "', sans-serif";
  var th=loadTheme(); th.font=font; localStorage.setItem("otif_theme",JSON.stringify(th));
  if (font !== "DM Sans") {
    var link=document.createElement("link"); link.rel="stylesheet";
    link.href="https://fonts.googleapis.com/css2?family="+font.replace(" ","+")+":wght@400;500;600;700&display=swap";
    document.head.appendChild(link);
  }
}
function applyStoredTheme(){
  var th=loadTheme();
  if(th.nv) applyColor("--nv",th.nv);
  if(th.ac) applyColor("--ac",th.ac);
  if(th.gn) applyColor("--gn",th.gn);
  if(th.bg) applyColor("--bg",th.bg);
  if(th.font) applyFont(th.font);
}
function resetTheme(){ if(!confirm("Restaurar tudo ao padrao?"))return; localStorage.removeItem("otif_theme"); location.reload(); }
function saveSysName(){
  var v=document.getElementById("sysNameInp").value.trim(); if(!v)return;
  localStorage.setItem("otif_sysname",v);
  document.querySelector(".sb-lg h2").innerHTML=v; document.title="Sistema OTIF - "+v;
  toast("Nome salvo!");
}
function zeusUploadLogo(){
  var inp=document.createElement("input"); inp.type="file"; inp.accept="image/*";
  inp.onchange=function(e){ var f=e.target.files[0]; if(!f)return; var r=new FileReader(); r.onload=function(ev){ localStorage.setItem("otif_logo",ev.target.result); document.getElementById("sbLogoImg").src=ev.target.result; document.getElementById("sbLogoWrap").style.display="block"; toast("Logo salvo!"); renderAll(); }; r.readAsDataURL(f); };
  inp.click();
}

    H='<div class="ph"><div><h1>Importar Planilha Excel</h1><p>Importe abas Acoes e FNC da planilha</p></div></div>';
    H+='<div class="cd cp"><div class="dz" onclick="document.getElementById(\'fileImport\').click()">';
    H+='<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#8690A8" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>';
    H+='<p style="color:var(--mt);font-size:13px;margin-top:8px">Clique para selecionar o arquivo .xlsx</p></div>';
    H+='<input type="file" id="fileImport" accept=".xlsx,.xls" style="display:none" onchange="handleImport(event)">';
    H+='<div style="margin-top:14px;padding:12px;background:var(--sf);border-radius:8px;font-size:11px;color:var(--t2);line-height:1.6"><strong>Abas reconhecidas:</strong><br>Acoes e FNC</div></div>';
  }

  // ZEUS — USUARIOS
  if(P==="zeus_users"){
    var roleLabel = { admin:"Administrador", editor:"Editor", viewer:"Visualizador" };
    var roleCls   = { admin:"badge badge-admin", editor:"badge badge-editor", viewer:"badge badge-viewer" };
    H='<div class="ph"><div><h1>Usuarios</h1><p>'+USERS.length+' usuario(s) cadastrado(s)</p></div><button class="bt bp" onclick="openNewUserModal()">+ Novo Usuario</button></div>';
    if(!USERS.length) {
      H+='<div class="cd cp" style="text-align:center;color:var(--mt);padding:40px">Nenhum usuario. Clique em "+ Novo Usuario".</div>';
    } else {
      USERS.forEach(function(u){
        H+='<div class="user-card">';
        H+='<div style="width:40px;height:40px;border-radius:10px;background:var(--ab);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">'+(u.role==="admin"?"A":u.role==="editor"?"E":"V")+'</div>';
        H+='<div class="uc-info"><div class="uc-name">'+u.name+'</div><div class="uc-email">'+u.email+'</div></div>';
        H+='<span class="'+(roleCls[u.role]||"badge badge-viewer")+'">'+(roleLabel[u.role]||u.role)+'</span>';
        H+='<span class="badge '+(u.status==="active"?"badge-admin":"badge-viewer")+'">'+(u.status==="active"?"Ativo":"Inativo")+'</span>';
        H+='<div style="display:flex;gap:6px">';
        H+='<button class="ib" onclick="openEditUserModal(\''+u.id+'\')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#4A5068" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>';
        H+='<button class="ib" onclick="toggleUserStatus(\''+u.id+'\')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="'+(u.status==="active"?"#16A34A":"#8690A8")+'" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></button>';
        H+='<button class="ib dg" onclick="deleteUserById(\''+u.id+'\')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#DC2626" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg></button>';
        H+='</div></div>';
      });
    }
  }

  // ZEUS — PERSONALIZAR
  if(P==="zeus_design"){
    var th2=loadTheme();
    var sysName=localStorage.getItem("otif_sysname")||"Quimica Anastacio";
    var sbLogo=localStorage.getItem("otif_logo");
    H='<div class="ph"><div><h1>Personalizar Sistema</h1><p>Configure visual e dados do painel</p></div></div>';
    H+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:900px">';

    // Logo
    H+='<div class="cd cp" style="grid-column:1/3"><h3 style="font-family:\'Plus Jakarta Sans\',sans-serif;font-size:13px;font-weight:800;color:var(--nv);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--bd)">Logo do Menu</h3>';
    H+='<div style="display:flex;align-items:center;gap:16px"><div style="width:90px;height:56px;border:2px dashed #D1D5DB;border-radius:10px;display:flex;align-items:center;justify-content:center;overflow:hidden;background:var(--sf)">'+(sbLogo?'<img src="'+sbLogo+'" style="max-width:100%;max-height:100%;object-fit:contain">':"Sem logo")+'</div>';
    H+='<div style="display:flex;gap:8px"><button class="bt bp" onclick="zeusUploadLogo()">Trocar Logo</button>'+(sbLogo?'<button class="bt bo" onclick="zeusRemoveLogo()">Remover</button>':"")+'</div></div></div>';

    // Nome
    H+='<div class="cd cp"><h3 style="font-family:\'Plus Jakarta Sans\',sans-serif;font-size:13px;font-weight:800;color:var(--nv);margin-bottom:12px">Nome do Sistema</h3>';
    H+='<div style="display:flex;gap:8px"><input id="sysNameInp" class="in" value="'+sysName+'" style="flex:1"><button class="bt bp" onclick="saveSysName()">Salvar</button></div></div>';

    // Fonte
    H+='<div class="cd cp"><h3 style="font-family:\'Plus Jakarta Sans\',sans-serif;font-size:13px;font-weight:800;color:var(--nv);margin-bottom:12px">Fonte</h3>';
    H+='<select class="in" onchange="applyFont(this.value)">';
    ["DM Sans","Inter","Roboto","Poppins","Open Sans"].forEach(function(f){ H+='<option value="'+f+'"'+((th2.font||"DM Sans")===f?" selected":"")+'>'+f+'</option>'; });
    H+='</select></div>';

    // Cores
    H+='<div class="cd cp" style="grid-column:1/3"><h3 style="font-family:\'Plus Jakarta Sans\',sans-serif;font-size:13px;font-weight:800;color:var(--nv);margin-bottom:12px">Cores</h3>';
    [
      ["--nv","nv",th2.nv||"#0D2240","Cor Principal (Menu)","Fundo do menu e botoes primarios"],
      ["--ac","ac",th2.ac||"#2563EB","Cor de Destaque","Links e botoes secundarios"],
      ["--gn","gn",th2.gn||"#16A34A","Cor Verde","Indicadores positivos"],
      ["--bg","bg",th2.bg||"#F4F6FA","Cor de Fundo","Fundo geral do sistema"]
    ].forEach(function(c){
      H+='<div class="theme-row"><div><div class="theme-label">'+c[3]+'</div><div class="theme-sub">'+c[4]+'</div></div>';
      H+='<div class="color-swatch"><input type="color" value="'+c[2]+'" oninput="applyColor(\''+c[0]+'\',this.value)" onchange="saveThemeColor(\''+c[1]+'\',this.value)"></div></div>';
    });
    H+='</div>';

    // Restaurar
    H+='<div class="cd cp" style="grid-column:1/3;display:flex;justify-content:flex-end"><button class="bt bo" onclick="resetTheme()">Restaurar Padrao</button></div>';
    H+='</div>';
  }

  mc.innerHTML = H;
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
async function initApp() {
  // Nav
  var visibleNav = NAV.filter(function(p){ return !p.zeus || _isZeus; });
  document.getElementById("navArea").innerHTML = visibleNav.map(function(p){
    return '<button class="nb" data-id="'+p.id+'" onclick="goPage(\''+p.id+'\')">' + p.icon + " " + p.lbl + '</button>';
  }).join("");

  // Anos
  var ys = document.getElementById("yearSel");
  ys.innerHTML = "";
  YRS.forEach(function(y){ var o=document.createElement("option"); o.value=y; o.textContent=y; ys.appendChild(o); });
  ys.value = "2025";

  // Data
  document.getElementById("dateNow").textContent = new Date().toLocaleDateString("pt-BR");

  // Chips
  renderMonthChips();

  // Dados
  await loadData();
  if (_isZeus) await loadUsers();

  if (CLS.length) window._selC = CLS[0].id;

  renderAll();
}
</script>
</body>
</html>
