<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema OTIF — Química Anastácio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--bg:#F4F6FA;--wh:#FFF;--sf:#F8F9FC;--bd:rgba(0,0,0,.07);--tx:#1A1D2B;--t2:#4A5068;--mt:#8690A8;--nv:#0D2240;--n2:#162D50;--ac:#2563EB;--ab:rgba(37,99,235,.08);--gn:#16A34A;--gb:#DCFCE7;--gr:rgba(22,163,74,.2);--rd:#DC2626;--rb:#FEE2E2;--rr:rgba(220,38,38,.18);--yl:#D97706;--yb:#FEF3C7;--ra:16px;--sh:0 1px 3px rgba(0,0,0,.04)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);height:100vh;overflow:hidden;display:flex}

/* Login */
#loginScreen{position:fixed;inset:0;background:linear-gradient(135deg,#0D2240 0%,#1e3a5f 100%);display:flex;align-items:center;justify-content:center;z-index:99999;flex-direction:column}
.login-box{background:#fff;border-radius:20px;padding:40px 36px;width:360px;box-shadow:0 24px 80px rgba(0,0,0,.3)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo h1{font-family:'Plus Jakarta Sans',sans-serif;font-size:22px;font-weight:800;color:var(--nv)}
.login-logo h1 span{color:#2563EB}
.login-logo small{font-size:10px;color:var(--mt);letter-spacing:2px;text-transform:uppercase;display:block;margin-top:2px}
.login-field{margin-bottom:14px}
.login-field label{font-size:11px;font-weight:700;color:var(--t2);display:block;margin-bottom:5px}
.login-field input{width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid #E5E7EB;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border .15s}
.login-field input:focus{border-color:var(--ac)}
.login-err{font-size:11px;color:var(--rd);text-align:center;margin-bottom:10px;min-height:16px;font-weight:600}
.login-btn{width:100%;padding:12px;border-radius:10px;border:none;background:var(--nv);color:#fff;font-size:13px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;transition:background .15s;margin-top:4px}
.login-btn:hover{background:var(--n2)}
#appShell{display:none;width:100%;height:100%;flex-direction:row}
#appShell.visible{display:flex}
.zeus-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(96,165,250,.2);color:#60A5FA;border-radius:100px;padding:2px 8px;font-size:9px;font-weight:700;letter-spacing:.5px}
.sb-logo-img{width:100%;max-height:38px;object-fit:contain;margin-bottom:6px;border-radius:6px;cursor:pointer}
/* Zeus panel */
.zeus-section{margin-bottom:24px}
.zeus-section h3{font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:800;color:var(--nv);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--bd)}
.user-card{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#fff;border:1px solid var(--bd);border-radius:10px;margin-bottom:8px}
.user-card .uc-info{display:flex;flex-direction:column;gap:2px}
.user-card .uc-name{font-size:13px;font-weight:700;color:var(--nv)}
.user-card .uc-email{font-size:11px;color:var(--mt)}
.user-card .uc-actions{display:flex;gap:6px}
.badge-pending{background:var(--yb);color:var(--yl);padding:2px 8px;border-radius:100px;font-size:9px;font-weight:700}
.badge-active{background:var(--gb);color:var(--gn);padding:2px 8px;border-radius:100px;font-size:9px;font-weight:700}
.badge-rejected{background:var(--rb);color:var(--rd);padding:2px 8px;border-radius:100px;font-size:9px;font-weight:700}
.color-swatch{width:36px;height:36px;border-radius:8px;border:2px solid #E5E7EB;cursor:pointer;overflow:hidden;padding:0}
.color-swatch input[type=color]{width:150%;height:150%;margin:-20%;border:none;cursor:pointer;background:none;padding:0}
.theme-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bd)}
.theme-row:last-child{border-bottom:none}
.theme-label{font-size:12px;font-weight:600;color:var(--t2)}
.theme-sub{font-size:10px;color:var(--mt);margin-top:1px}
/* Solicitacao de acesso na tela de login */
.login-switch{text-align:center;margin-top:16px;font-size:11px;color:var(--mt)}
.login-switch a{color:var(--ac);font-weight:700;cursor:pointer;text-decoration:none}
.login-switch a:hover{text-decoration:underline}
#requestPanel{display:none}


/* Sidebar */
.sb{width:200px;background:var(--nv);display:flex;flex-direction:column;padding:16px 0;flex-shrink:0}
.sb-lg{padding:0 14px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-lg h2{font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:800;color:#fff}
.sb-lg h2 span{color:#60A5FA}
.sb-lg small{font-size:8px;color:rgba(255,255,255,.3);letter-spacing:2px;text-transform:uppercase}
.sb nav{flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:1px;overflow-y:auto}
.nb{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;border:none;cursor:pointer;font-size:11px;font-weight:600;font-family:'DM Sans',sans-serif;background:transparent;color:rgba(255,255,255,.4);transition:all .15s;text-align:left;width:100%}
.nb:hover{color:rgba(255,255,255,.7);background:rgba(255,255,255,.04)}
.nb.on{background:rgba(96,165,250,.15);color:#60A5FA}
.sb-bt{padding:10px 12px 6px;border-top:1px solid rgba(255,255,255,.08)}
.sb-bt label{font-size:8px;color:rgba(255,255,255,.3);letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:4px}
.sb-bt select{width:100%;padding:6px 8px;border-radius:6px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#fff;font-size:11px;font-family:'DM Sans',sans-serif;outline:none}
.sb-bt select option{background:var(--nv);color:#fff}

/* Main */
.mw{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 24px;background:#fff;border-bottom:1px solid var(--bd);flex-shrink:0;gap:8px;flex-wrap:wrap}
.tf{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.fsel{padding:5px 26px 5px 8px;border-radius:6px;border:1px solid #E5E7EB;font-size:11px;font-weight:600;font-family:'DM Sans',sans-serif;color:var(--tx);background:#fff url("data:image/svg+xml,%3Csvg width='8' height='5' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%234A5068' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E") no-repeat right 6px center;appearance:none;outline:none;cursor:pointer}

/* Content */
#mainContent{flex:1;overflow:auto;padding:20px 24px 36px}

/* Cards */
.cd{background:#fff;border:1px solid var(--bd);border-radius:var(--ra);box-shadow:var(--sh)}.cp{padding:20px}

/* KPIs */
.kg{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.kp{position:relative;overflow:hidden;padding:16px 18px}.kp::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%}
.kp.g::before{background:var(--gn)}.kp.b::before{background:var(--ac)}.kp.r::before{background:var(--rd)}
.kl{font-size:9px;color:var(--mt);text-transform:uppercase;letter-spacing:.8px;font-weight:700;margin-bottom:8px}
.kv{font-family:'Plus Jakarta Sans',sans-serif;font-size:26px;font-weight:800;line-height:1}
.ks{font-size:10px;color:var(--mt);margin-top:4px}

/* Charts */
.cg{display:grid;grid-template-columns:5fr 3fr;gap:10px;margin-bottom:16px}
.bw{display:flex;align-items:flex-end;gap:6px;height:130px;border-bottom:2px solid #EEF1F6}
.bc{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end}
.bv{font-size:9px;font-weight:700;font-family:'Plus Jakarta Sans',sans-serif}
.br{width:100%;max-width:32px;border-radius:5px 5px 0 0;min-height:2px}
.br.f{background:linear-gradient(180deg,#22c55e,#16a34a)}.br.p{background:linear-gradient(180deg,#fbbf24,#d97706)}
.bm{font-size:8px;color:var(--mt);font-weight:600;text-transform:uppercase;padding-top:6px}
.dw{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px}
.dr{position:relative;width:110px;height:110px}.dr svg{transform:rotate(-90deg)}
.dc{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.dc .dv{font-family:'Plus Jakarta Sans',sans-serif;font-size:24px;font-weight:800;color:var(--gn);line-height:1}
.dc .dl{font-size:8px;color:var(--mt);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.lg{display:flex;gap:12px}.lg span{font-size:10px;color:var(--t2);display:flex;align-items:center;gap:4px}
.lg i{width:8px;height:8px;border-radius:2px;display:inline-block}

/* Tables */
.th{padding:12px 16px;border-bottom:1px solid var(--bd);background:var(--sf);font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
table{width:100%;border-collapse:collapse}
th{padding:8px 10px;font-size:8.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--mt);font-weight:700;text-align:left;border-bottom:1px solid var(--bd);white-space:nowrap}
td{padding:8px 10px;font-size:11px;vertical-align:middle;border-bottom:1px solid rgba(0,0,0,.03)}
tr.is{background:rgba(220,38,38,.02)}

/* Status */
.st{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;transition:all .12s;border:1px solid transparent}
.st.ok{background:var(--gb);color:var(--gn);border-color:var(--gr)}.st.fl{background:var(--rb);color:var(--rd);border-color:var(--rr)}
.st:hover{transform:scale(1.15)}

/* OTIF input */
.oe{width:50px;padding:3px 4px;border-radius:5px;border:1px solid #D1D5DB;font-size:12px;font-weight:800;font-family:'Plus Jakarta Sans',sans-serif;text-align:center;outline:none}
.oe.ok{color:var(--gn)}.oe.lo{color:var(--yl)}

/* Buttons */
.bt{display:inline-flex;align-items:center;gap:5px;padding:7px 16px;border-radius:8px;border:none;font-size:11px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .12s}
.bp{background:var(--nv);color:#fff}.bp:hover{background:var(--n2)}
.bo{background:#fff;color:var(--t2);border:1px solid #E5E7EB}
.bgr{background:var(--gn);color:#fff}

/* Inputs */
.in{padding:7px 12px;border-radius:8px;border:1px solid #E5E7EB;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;width:100%}.in:focus{border-color:var(--ac)}

/* Clients */
.cc{display:flex;align-items:center;gap:12px;padding:14px 18px;margin-bottom:8px}.cc.off{opacity:.4}
.la{width:50px;height:50px;border-radius:10px;border:2px dashed #D1D5DB;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;flex-shrink:0;background:var(--sf)}
.la img{width:100%;height:100%;object-fit:contain}.la:hover{border-color:var(--ac)}
.ib{width:30px;height:30px;border-radius:7px;border:1px solid #E5E7EB;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer}.ib:hover{border-color:var(--ac);background:var(--ab)}.ib.dg{border-color:#FCA5A5}.ib.dg:hover{background:var(--rb)}

/* Page header */
.ph h1{font-family:'Plus Jakarta Sans',sans-serif;font-size:20px;font-weight:800;color:var(--nv)}
.ph p{font-size:11px;color:var(--mt);margin-top:2px}.ph{margin-bottom:18px;display:flex;justify-content:space-between;align-items:flex-start}

/* Form table */
.ft{width:100%;border-collapse:collapse}.ft th,.ft td{padding:8px 12px;border:1px solid var(--bd);text-align:center;font-size:11px}
.ft th{background:var(--sf);font-weight:700;color:var(--nv);font-size:9px;text-transform:uppercase;letter-spacing:.4px}
.ft td.inn{text-align:left;font-weight:600;color:var(--tx);font-size:10px;background:#FAFBFD;min-width:200px;white-space:normal;line-height:1.3}

/* Consolidado */
.cv{font-weight:800;font-size:14px;text-align:center;padding:6px}
.cv.gn{background:var(--gb);color:var(--gn)}.cv.rd{background:var(--rb);color:var(--rd)}.cv.yl{background:var(--yb);color:var(--yl)}

/* Actions table */
.at{width:100%;border-collapse:collapse;font-size:11px}
.at th{padding:8px;font-size:8px;text-transform:uppercase;letter-spacing:.5px;color:var(--mt);font-weight:700;text-align:left;border-bottom:2px solid var(--bd);background:var(--sf);white-space:nowrap}
.at td{padding:6px 8px;border-bottom:1px solid var(--bd);vertical-align:top}

/* Misc */
.cl{height:56px;object-fit:contain}
.ep{border:2px solid #E5E7EB;border-radius:var(--ra);padding:24px 20px;background:#fff}
.eh{text-align:center;padding-bottom:14px;border-bottom:1px solid #EEF1F6;margin-bottom:14px}
.to{position:fixed;top:16px;right:16px;z-index:9999;padding:10px 18px;border-radius:10px;background:var(--nv);color:#fff;font-size:12px;font-weight:600;box-shadow:0 8px 32px rgba(0,0,0,.15);transform:translateX(120%);transition:transform .3s ease}.to.sh{transform:translateX(0)}
.mc{padding:4px 9px;border-radius:100px;border:1px solid #E5E7EB;font-size:9px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;background:#fff;color:var(--t2);display:inline-block;user-select:none}
.mc.on{background:var(--nv);color:#fff;border-color:var(--nv)}.mc:hover:not(.on){border-color:var(--ac)}
.dz{border:2px dashed #D1D5DB;border-radius:var(--ra);padding:30px;text-align:center;cursor:pointer;background:#FAFBFD}.dz:hover{border-color:var(--ac);background:var(--ab)}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:100px}
</style>
</head>
<body>

<!-- TELA DE LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <h1>Química <span>Anastácio</span></h1>
      <small>Painel OTIF · Acesso Restrito</small>
    </div>
    <div class="login-field">
      <label>Usuário</label>
      <input type="text" id="loginUser" placeholder="Seu usuário" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="login-field">
      <label>Senha</label>
      <input type="password" id="loginPass" placeholder="Sua senha" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="login-err" id="loginErr"></div>
    <button class="login-btn" onclick="doLogin()">Entrar</button>
    <div class="login-switch">Não tem acesso? <a onclick="toggleRequestPanel()">Solicitar acesso</a></div>
  </div>
  <!-- Painel de solicitação -->
  <div class="login-box" id="requestPanel" style="margin-top:16px;display:none">
    <div style="font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:800;color:var(--nv);margin-bottom:16px">Solicitar Acesso</div>
    <div class="login-field"><label>Nome completo</label><input type="text" id="reqName" placeholder="Seu nome" class="login-field-in"></div>
    <div class="login-field"><label>E-mail</label><input type="email" id="reqEmail" placeholder="seu@email.com" class="login-field-in"></div>
    <div class="login-field"><label>Senha desejada</label><input type="password" id="reqPass" placeholder="Mínimo 6 caracteres" class="login-field-in"></div>
    <div class="login-err" id="reqErr"></div>
    <button class="login-btn" onclick="doRequestAccess()">Enviar Solicitação</button>
    <div class="login-switch"><a onclick="toggleRequestPanel()">← Voltar ao login</a></div>
  </div>
</div>

<!-- APP PRINCIPAL -->
<div id="appShell">
<aside class="sb">
  <div class="sb-lg">
  <div id="sbLogoWrap" style="display:none;margin-bottom:6px"><img id="sbLogoImg" class="sb-logo-img" onclick="zeusUploadSbLogo()" title="Clique para trocar o logo"></div>
  <h2>Química <span>Anastácio</span></h2>
  <small>Painel OTIF</small>
  <div id="zeusBadgeWrap" style="display:none;margin-top:4px"><span class="zeus-badge">⚡ Zeus</span></div>
  <div id="sbLogoBtn" style="display:none;margin-top:6px"><button onclick="zeusUploadSbLogo()" style="font-size:9px;padding:3px 8px;border-radius:5px;border:1px dashed rgba(255,255,255,.3);background:transparent;color:rgba(255,255,255,.4);cursor:pointer;font-family:DM Sans,sans-serif">+ Logo</button></div>
</div>
  <nav id="navArea"></nav>
  <div class="sb-bt">
    <label>Cliente</label>
    <select id="clientSel" onchange="window._selC=this.value;renderAll()"></select>
  </div>
</aside>

<div class="mw">
  <div class="topbar">
    <div class="tf">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#8690A8" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
      <select id="yearSel" class="fsel" onchange="renderAll()"></select>
      <span style="font-size:10px;color:var(--mt);font-weight:600">Meses:</span>
      <div id="mChips" style="display:flex;gap:3px;flex-wrap:wrap"></div>
    </div>
    <div style="font-size:11px;color:var(--mt)" id="dateNow"></div>
  </div>
  <div id="mainContent"></div>
</div>

</div><!-- /appShell -->

<div id="mdl" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:9000;align-items:center;justify-content:center" onclick="if(event.target===this)this.style.display='none'">
  <div style="background:#fff;border-radius:14px;padding:24px;width:560px;max-width:92vw;max-height:85vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <h2 id="mdlT" style="font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;font-weight:800;color:#0D2240;margin:0"></h2>
      <button onclick="document.getElementById('mdl').style.display='none'" style="background:none;border:none;cursor:pointer;color:#8690A8;font-size:18px">✕</button>
    </div>
    <div id="mdlB"></div>
  </div>
</div>
<div class="to" id="toastEl"></div>

<script src="supabase-storage.js"></script>
<script>
// ═══ CONSTANTS ═══
const MS=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const SH=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
const YRS=[2023,2024,2025,2026];
const NAV=[
  {id:"dashboard",icon:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>',lbl:"Dashboard"},
  {id:"form",icon:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>',lbl:"Preenchimento"},
  {id:"consolidado",icon:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h18v18H3z"/><path d="M3 9h18"/><path d="M3 15h18"/><path d="M9 3v18"/></svg>',lbl:"Consolidado"},
  {id:"acoes",icon:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>',lbl:"Ações"},
  {id:"fnc",icon:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>',lbl:"FNC"},
  {id:"clients",icon:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>',lbl:"Clientes"},
  {id:"copy",icon:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>',lbl:"Copiar Relatório"},

let _saving = false;
let _saveTimer = null;

async function loadData(){
  if (githubConfigValid()) {
    const data = await githubLoad();
    if (data) {
      if (data.clientes && data.clientes.length) CLS = data.clientes;
      if (data.registros && data.registros.length) RCS = data.registros;
      if (data.indicadores && data.indicadores.length) IND = data.indicadores;
      if (data.acoes) ACOES = data.acoes;
      if (data.fncs) FNCS = data.fncs;
    }
  }
  if (!RCS.length) RCS = defaultRecs();
}

// Debounce: salva 1.5s após última alteração (evita muitos commits)
async function saveData(){
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(async () => {
    if (!githubConfigValid()) {
      console.warn("GitHub não configurado. Dados apenas em memória.");
      return;
    }
    if (_saving) return;
    _saving = true;
    const data = {
      clientes: CLS,
      indicadores: IND,
      registros: RCS,
      acoes: ACOES,
      fncs: FNCS
    };
    const ok = await githubSave(data);
    _saving = false;
    if (ok) {
      console.log("✓ Salvo no GitHub");
    } else {
      toast("⚠️ Erro ao salvar no GitHub");
    }
  }, 1500);
}

// ═══ LOGIN & ZEUS ═══
const ZEUS_USER = "Zeus";
const ZEUS_PASS = "Anastacio@2026";
let _isZeus = false;



function zeusUploadSbLogo(){
  if(!_isZeus) return;
  const inp = document.createElement("input");
  inp.type = "file"; inp.accept = "image/*";
  inp.onchange = e => {
    const f = e.target.files[0]; if(!f) return;
    const r = new FileReader();
    r.onload = ev => {
      localStorage.setItem("sb_logo_anastacio", ev.target.result);
      showSbLogo(ev.target.result);
      toast("✓ Logo salvo!");
    };
    r.readAsDataURL(f);
  };
  inp.click();
}

function showSbLogo(src){
  const wrap = document.getElementById("sbLogoWrap");
  const img = document.getElementById("sbLogoImg");
  img.src = src;
  wrap.style.display = "block";
}


// ═══ USUÁRIOS (salvo no Supabase via USERS array) ═══
let USERS = [];

async function loadUsers(){
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/usuarios?order=created_at.asc`,{
      headers:{"apikey":SUPABASE_KEY,"Authorization":`Bearer ${SUPABASE_KEY}`}
    });
    if(r.ok) USERS = await r.json();
  } catch(e){ USERS = JSON.parse(localStorage.getItem('otif_users')||'[]'); }
}

async function saveUsers(){
  localStorage.setItem('otif_users', JSON.stringify(USERS));
  // Tenta salvar no Supabase também
  try {
    for(const u of USERS){
      await fetch(`${SUPABASE_URL}/rest/v1/usuarios`,{
        method:'POST',
        headers:{"apikey":SUPABASE_KEY,"Authorization":`Bearer ${SUPABASE_KEY}`,"Content-Type":"application/json","Prefer":"resolution=merge-duplicates"},
        body: JSON.stringify([{id:u.id,name:u.name,email:u.email,pass:u.pass,status:u.status}])
      });
    }
  } catch(e){}
}

function toggleRequestPanel(){
  const p = document.getElementById("requestPanel");
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
}

async function doRequestAccess(){
  const name  = document.getElementById("reqName").value.trim();
  const email = document.getElementById("reqEmail").value.trim();
  const pass  = document.getElementById("reqPass").value;
  const err   = document.getElementById("reqErr");
  if(!name||!email||!pass){ err.textContent="Preencha todos os campos."; return; }
  if(pass.length < 6){ err.textContent="Senha mínimo 6 caracteres."; return; }
  await loadUsers();
  if(USERS.find(u=>u.email===email)){ err.textContent="Este e-mail já foi cadastrado."; return; }
  const newUser = { id: "u_"+Date.now(), name, email, pass, status:"pending" };
  USERS.push(newUser);
  await saveUsers();
  err.style.color="var(--gn)";
  err.textContent="✓ Solicitação enviada! Aguarde aprovação.";
  document.getElementById("reqName").value="";
  document.getElementById("reqEmail").value="";
  document.getElementById("reqPass").value="";
}

async function doLogin(){
  const u   = document.getElementById("loginUser").value.trim();
  const p   = document.getElementById("loginPass").value;
  const err = document.getElementById("loginErr");
  // Zeus
  if(u === ZEUS_USER && p === ZEUS_PASS){
    _isZeus = true;
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("appShell").classList.add("visible");
    document.getElementById("zeusBadgeWrap").style.display = "block";
    document.getElementById("sbLogoBtn").style.display = "block";
    const logo = localStorage.getItem("sb_logo_anastacio");
    if(logo){ showSbLogo(logo); }
    err.textContent = "";
    await loadUsers();
    initApp();
    return;
  }
  // Usuário comum
  await loadUsers();
  const found = USERS.find(usr => usr.email === u || usr.name === u);
  if(!found){ err.textContent = "Usuário não encontrado."; return; }
  if(found.status === 'pending'){ err.textContent = "Acesso ainda não aprovado pelo administrador."; return; }
  if(found.status === 'rejected'){ err.textContent = "Seu acesso foi recusado. Entre em contato com o administrador."; return; }
  if(found.pass !== p){ err.textContent = "Senha incorreta."; return; }
  _isZeus = false;
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("appShell").classList.add("visible");
  err.textContent = "";
  initApp();
}

function approveUser(id){
  const u = USERS.find(x=>x.id===id);
  if(u){ u.status='active'; saveUsers(); renderAll(); toast(`✓ ${u.name} aprovado!`); }
}
function rejectUser(id){
  const u = USERS.find(x=>x.id===id);
  if(u){ u.status='rejected'; saveUsers(); renderAll(); toast(`${u.name} recusado.`); }
}
function revokeUser(id){
  if(!confirm("Revogar acesso deste usuário?")) return;
  const u = USERS.find(x=>x.id===id);
  if(u){ u.status='rejected'; saveUsers(); renderAll(); toast("Acesso revogado."); }
}

// ═══ TEMA / PERSONALIZAÇÃO ═══
function loadTheme(){
  return JSON.parse(localStorage.getItem('otif_theme')||'{}');
}
function applyColor(varName, value){
  document.documentElement.style.setProperty(varName, value);
  // Sincronizar cor secundária para nv
  if(varName==='--nv') document.documentElement.style.setProperty('--n2', value+'dd');
}
function saveThemeColor(key, value){
  const th = loadTheme(); th[key]=value;
  localStorage.setItem('otif_theme', JSON.stringify(th));
}
function applyFont(font){
  document.body.style.fontFamily = `'${font}', sans-serif`;
  const th = loadTheme(); th.font=font;
  localStorage.setItem('otif_theme', JSON.stringify(th));
  // Carrega do Google Fonts se necessário
  if(!['DM Sans'].includes(font)){
    const link=document.createElement('link');
    link.rel='stylesheet';
    link.href=`https://fonts.googleapis.com/css2?family=${font.replace(' ','+')}:wght@400;500;600;700&display=swap`;
    document.head.appendChild(link);
  }
}
function resetTheme(){
  if(!confirm("Restaurar todas as cores e fontes padrão?")) return;
  localStorage.removeItem('otif_theme');
  location.reload();
}
function applyStoredTheme(){
  const th = loadTheme();
  if(th.nv) applyColor('--nv', th.nv);
  if(th.ac) applyColor('--ac', th.ac);
  if(th.gn) applyColor('--gn', th.gn);
  if(th.bg) applyColor('--bg', th.bg);
  if(th.font) applyFont(th.font);
}
function zeusRemoveLogo(){
  localStorage.removeItem('sb_logo_anastacio');
  document.getElementById("sbLogoWrap").style.display="none";
  toast("Logo removido.");
  renderAll();
}

async function initApp(){
  applyStoredTheme();
  // Build nav
  const visibleNav = NAV.filter(p => !p.zeusOnly || _isZeus);
  document.getElementById("navArea").innerHTML = visibleNav.map((p,i)=>`<button class="nb${i===0?' on':''}" onclick="goPage('${p.id}')">${p.icon} ${p.lbl}</button>`).join('');

  // Year selector
  const ys=document.getElementById("yearSel");
  YRS.forEach(y=>{const o=document.createElement("option");o.value=y;o.textContent=y;ys.appendChild(o)});
  ys.value="2025";

  // Date
  document.getElementById("dateNow").textContent=new Date().toLocaleDateString("pt-BR");

  // Month chips
  renderMonthChips();

  // Load data
  await loadData();
  if(_isZeus) await loadUsers();

  // Set initial client
  if(CLS.length) window._selC = CLS[0].id;

  // First render
  renderAll();
}
</script>
</body>
</html>
